name: Sync produkter och sidor till Typesense

on:
  # Kör varje natt kl 03:00 svensk tid (01:00 UTC)
  schedule:
    - cron: "0 1 * * *"

  workflow_dispatch:

jobs:
  sync:
    name: Hämta feeds och synka
    runs-on: ubuntu-latest

    steps:
      - name: Checka ut repo
        uses: actions/checkout@v4

      - name: Installera Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installera beroenden
        run: npm install

      - name: Synka produkter
        env:
          TYPESENSE_HOST: ${{ secrets.TYPESENSE_HOST }}
          TYPESENSE_ADMIN_KEY: ${{ secrets.TYPESENSE_ADMIN_KEY }}
        run: node sync.mjs

      - name: Synka sidor
        env:
          TYPESENSE_HOST: ${{ secrets.TYPESENSE_HOST }}
          TYPESENSE_ADMIN_KEY: ${{ secrets.TYPESENSE_ADMIN_KEY }}
        run: node sync-pages.mjs
