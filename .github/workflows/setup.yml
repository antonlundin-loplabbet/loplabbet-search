name: Setup – Skapa kollektion och synka första gången

on:
  workflow_dispatch:
    inputs:
      recreate_collection:
        description: "Radera och återskapa kollektioner? (ja/nej)"
        required: false
        default: "nej"

jobs:
  setup:
    name: Skapa kollektioner + importera synonymer + synka allt
    runs-on: ubuntu-latest

    steps:
      - name: Checka ut repo
        uses: actions/checkout@v4

      - name: Installera Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installera beroenden
        run: npm install

      - name: Skapa Typesense-kollektion (produkter)
        env:
          TYPESENSE_HOST: ${{ secrets.TYPESENSE_HOST }}
          TYPESENSE_ADMIN_KEY: ${{ secrets.TYPESENSE_ADMIN_KEY }}
          RECREATE: ${{ github.event.inputs.recreate_collection == 'ja' && 'true' || 'false' }}
        run: node create-collection.mjs

      - name: Skapa Typesense-kollektion (sidor)
        env:
          TYPESENSE_HOST: ${{ secrets.TYPESENSE_HOST }}
          TYPESENSE_ADMIN_KEY: ${{ secrets.TYPESENSE_ADMIN_KEY }}
          RECREATE: ${{ github.event.inputs.recreate_collection == 'ja' && 'true' || 'false' }}
        run: node create-pages-collection.mjs

      - name: Importera synonymer
        env:
          TYPESENSE_HOST: ${{ secrets.TYPESENSE_HOST }}
          TYPESENSE_ADMIN_KEY: ${{ secrets.TYPESENSE_ADMIN_KEY }}
        run: node import-synonyms.mjs

      - name: Sätt curation rules
        env:
          TYPESENSE_HOST: ${{ secrets.TYPESENSE_HOST }}
          TYPESENSE_ADMIN_KEY: ${{ secrets.TYPESENSE_ADMIN_KEY }}
        run: node setup-curations.mjs

      - name: Synka produkter
        env:
          TYPESENSE_HOST: ${{ secrets.TYPESENSE_HOST }}
          TYPESENSE_ADMIN_KEY: ${{ secrets.TYPESENSE_ADMIN_KEY }}
        run: node sync.mjs

      - name: Synka sidor
        env:
          TYPESENSE_HOST: ${{ secrets.TYPESENSE_HOST }}
          TYPESENSE_ADMIN_KEY: ${{ secrets.TYPESENSE_ADMIN_KEY }}
        run: node sync-pages.mjs
