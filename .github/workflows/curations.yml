name: Sätt curation rules

# Manuell trigger — körs när du vill skapa eller uppdatera curation rules
# i Typesense (efter att du redigerat setup-curations.mjs).
on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Kör setup-curations.mjs
        env:
          TYPESENSE_HOST: ${{ secrets.TYPESENSE_HOST }}
          TYPESENSE_ADMIN_KEY: ${{ secrets.TYPESENSE_ADMIN_KEY }}
        run: node setup-curations.mjs
